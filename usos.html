<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <title>USOS</title>
  </head>
  <body>
    <header class="align-top bg-blue-200 mx-5 p-1">
      <nav class="flex justify-between items-center lg:items-start">
        <ul
          id="mobile-menu"
          class="p-2 text-gray-500 flex flex-col lg:flex-row lg:items-center lg:gap-5 lg:w-full"
        >
          <li>
            <a href="index.html" class="hover:opacity-80 transition-opacity">
              <canvas
                id="canvas"
                width="200"
                height="200"
                class="w-10 h-10"
              ></canvas>
            </a>
          </li>
          <li class="hidden lg:block">Studia stacjonarne</li>
          <li class="hidden lg:block">Studia niestacjonarne</li>
          <li class="hidden lg:block">Pracownicy</li>
          <li class="hidden lg:block lg:ml-auto">
            <a
              href="#"
              id="usos-tab-link"
              class="hover:opacity-80 transition-opacity"
              >USOS</a
            >
          </li>
        </ul>
        <button
          id="menu-btn"
          class="rounded-xl border border-gray-500 px-3 py-1 lg:hidden active:bg-gray-400"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>
    </header>

    <main class="flex flex-col items-center m-10">
      <form
        id="usos-form"
        name="usosForm"
        class="hidden flex-col items-center mt-5 w-full max-w-sm"
      >
        <select
          id="student-select"
          class="border border-gray-300 bg-white rounded-md p-3 m-2 w-full text-sm outline-none cursor-pointer"
        ></select>

        <select
          id="subject-select"
          class="border border-gray-300 bg-white rounded-md p-3 m-2 w-full text-sm outline-none cursor-pointer"
        ></select>

        <input
          id="grade-input"
          type="text"
          placeholder="Wpisz ocenę"
          class="border border-gray-300 rounded-md p-3 m-2 w-full text-sm outline-none"
        />

        <p class="flex justify-center text-xs text-gray-400 m-2">
          Wciśnij Enter w polu oceny, aby zapisać
        </p>
        <p class="flex justify-center text-xs text-gray-400 m-2">
          Kliknij wybraną ocenę, aby usunąć
        </p>
      </form>

      <h1 class="text-2xl font-bold mt-5 text-gray-800">Karty Studentów</h1>

      <div id="students-grid" class="w-full flex flex-wrap gap-5 my-5"></div>
    </main>
    <footer class="flex justify-between align-bottom bg-blue-200 m-5 p-1">
      <a
        href="#"
        class="text-blue-600 underline hover:text-blue-800 visited:text-purple-600"
        >Adres email</a
      >
    </footer>
    <script type="module" src="/src/usos.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
