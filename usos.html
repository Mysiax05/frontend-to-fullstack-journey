<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <title>USOS</title>
  </head>
  <body>
    <header class="align-top bg-blue-200 mx-5 p-1">
      <nav class="flex justify-between items-center lg:items-start">
        <ul
          id="mobile-menu"
          class="p-2 text-gray-500 flex flex-col lg:flex-row lg:items-center lg:gap-5 lg:w-full"
        >
          <li>
            <a href="index.html" class="hover:opacity-80 transition-opacity">
              <canvas
                id="canvas"
                width="200"
                height="200"
                class="w-10 h-10"
              ></canvas>
            </a>
          </li>
          <li class="hidden lg:block">Studia stacjonarne</li>
          <li class="hidden lg:block">Studia niestacjonarne</li>
          <li class="hidden lg:block">Pracownicy</li>
          <li class="hidden lg:block lg:ml-auto">
            <a href="usos.html" class="hover:opacity-80 transition-opacity"
              >USOS</a
            >
          </li>
        </ul>
        <button
          id="menu-btn"
          class="rounded-xl border border-gray-500 px-3 py-1 lg:hidden active:bg-gray-400"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>
    </header>

    <main class="flex flex-col items-center m-10">
      <form name="usosForm">
        <input
          name="basicInput"
          placeholder="Imie Nazwisko, (Ocena, Przedmiot)"
          class="border border-gray-300 rounded-md my-5 p-5 w-l md:w-xl text-xs"
        />
        <div class="flex flex-col gap-5">
          <button
            type="button"
            onclick="addDegree()"
            class="border border-gray-600 rounded-md p-2 hover:bg-blue-200 active:bg-gray-400"
          >
            Dodaj
          </button>
          <button
            type="button"
            onclick="deleteDegree()"
            class="border border-gray-600 rounded-md p-2 hover:bg-blue-200 active:bg-gray-400"
          >
            Usuń
          </button>
          <button
            type="button"
            onclick="showResults()"
            class="border border-gray-600 rounded-md p-2 hover:bg-blue-200 active:bg-gray-400"
          >
            Wyświetl
          </button>
        </div>
      </form>
    </main>
    <footer class="flex justify-between align-bottom bg-blue-200 m-5 p-1">
      <a
        href="#"
        class="text-blue-600 underline hover:text-blue-800 visited:text-purple-600"
        >Adres email</a
      >
    </footer>
    <script type="module" src="/src/usos.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
