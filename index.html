<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <title>UniPortal</title>
  </head>
  <body>
    <header class="align-top bg-blue-200 mx-5 p-1">
      <nav class="flex justify-between items-center lg:items-start">
        <ul
          id="mobile-menu"
          class="p-2 text-gray-500 flex flex-col lg:flex-row lg:items-center lg:gap-5 lg:w-full"
        >
          <li>
            <a href="index.html" class="hover:opacity-80 transition-opacity">
              <canvas
                id="canvas"
                width="200"
                height="200"
                class="w-10 h-10"
              ></canvas>
            </a>
          </li>
          <li class="hidden lg:block">Studia stacjonarne</li>
          <li class="hidden lg:block">Studia niestacjonarne</li>
          <li class="hidden lg:block">Pracownicy</li>
          <li class="hidden lg:block lg:ml-auto">
            <a href="usos.html" class="hover:opacity-80 transition-opacity"
              >USOS</a
            >
          </li>
        </ul>
        <button
          id="menu-btn"
          class="rounded-xl border border-gray-500 px-3 py-1 lg:hidden active:bg-gray-400"
        >
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>
    </header>

    <main>
      <h1 class="text-center text-3xl p-1">Wydział Informatyki</h1>

      <div class="flex flex-col md:items-start md:flex-row">
        <div class="border border-gray-300 rounded-md m-5 mt-0">
          <p class="p-2 text-center">Jan Kowalski</p>
          <div class="border border-gray-300 flex flex-col items-center">
            <img src="src/assets/man.png" alt="man" class="p-2" />
            <p>Pracownik</p>
          </div>
          <p class="text-center p-1">Karta 1</p>
        </div>

        <div class="border border-gray-300 rounded-md m-5 mt-0">
          <p class="p-2 text-center">Anna Nowak</p>
          <div class="border border-gray-300 flex flex-col items-center">
            <h2 class="text-xl p-2">
              Informatyka - Uczenie Maszynowe i Sztuczna Inteligencja
            </h2>
            <img src="src/assets/woman.png" alt="woman" class="p-2" />
            <p>Studentka</p>
          </div>
          <p class="text-center p-1">Karta 2</p>
        </div>

        <div class="border border-gray-300 rounded-md m-5 mt-0">
          <p class="p-2 text-center">Jerzy Zmuda</p>
          <div class="border border-gray-300 flex flex-col items-center">
            <h2 class="text-xl p-2">Informatyka - Data Science</h2>
            <img src="src/assets/man.png" alt="man" class="p-2" />
            <p>Student</p>
          </div>
          <p class="text-center p-1">Karta 3</p>
        </div>
      </div>
    </main>

    <footer class="flex justify-between align-bottom bg-blue-200 m-5 p-1">
      <a
        href="#"
        class="text-blue-600 underline hover:text-blue-800 visited:text-purple-600"
        >Adres email</a
      >
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
